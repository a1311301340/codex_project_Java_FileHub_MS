name: build-installers

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux packaging deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            ALSA_PKG=libasound2t64
          else
            ALSA_PKG=libasound2
          fi
          sudo apt-get install -y fakeroot dpkg rpm libgtk-3-0 libnss3 libxss1 "$ALSA_PKG"

      - name: Package for Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\package-win.ps1

      - name: Package for Linux
        if: runner.os == 'Linux'
        run: |
          chmod +x scripts/*.sh
          ./scripts/package-linux.sh

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ runner.os }}
          path: dist/installers/**
